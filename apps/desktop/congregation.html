<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'"
    />
    <title>Companion Bible</title>
    <link rel="stylesheet" href="/src/shared/fonts.css" />
    <link rel="stylesheet" href="/src/shared/base.css" />
    <link rel="stylesheet" href="/src/congregation/congregation.css" />
  </head>
  <body class="congregation-body">
    <div id="app" class="congregation-app">

      <!-- Idle — shown when no content is active -->
      <div id="state-idle" class="congregation-state">
        <div class="idle-mark" aria-hidden="true">✦</div>
      </div>

      <!-- Verse — scripture text with reference below -->
      <div id="state-verse" class="congregation-state" hidden>
        <div class="verse-card">
          <div class="verse-text" id="verse-text">
            For God so loved the world, that he gave his only begotten Son,
            that whosoever believeth in him should not perish,
            but have everlasting life.
          </div>
          <div class="verse-rule" aria-hidden="true"></div>
          <div class="verse-reference" id="verse-reference">John 3:16</div>
          <div class="verse-translation" id="verse-translation">KJV</div>
        </div>
      </div>

      <!-- SermonTitle — full-screen title with eyebrow label -->
      <div id="state-title" class="congregation-state" hidden>
        <div class="title-card">
          <div class="title-eyebrow" aria-label="Sermon">Sermon</div>
          <div class="title-text" id="title-text"></div>
        </div>
      </div>

      <!-- SubPoint — outline point with accent left border -->
      <div id="state-subpoint" class="congregation-state" hidden>
        <div class="subpoint-card">
          <div class="subpoint-text" id="subpoint-text"></div>
        </div>
      </div>

      <!-- Hymn — stanza / chorus lines with hymn number and title -->
      <div id="state-hymn" class="congregation-state" hidden>
        <div class="hymn-card">
          <div class="hymn-eyebrow">
            <span id="hymn-number-label"></span>
            <span class="hymn-eyebrow-sep" aria-hidden="true">·</span>
            <span id="hymn-section-label"></span>
          </div>
          <div class="hymn-title" id="hymn-title"></div>
          <div class="hymn-lines" id="hymn-lines"></div>
        </div>
      </div>

      <!-- Announcement — pre-service slides with church branding -->
      <div id="state-announcement" class="congregation-state" hidden>
        <div class="announcement-header">
          <img src="/deeper_life_logo.png" class="announcement-logo" alt="Deeper Life Bible Church" />
          <div class="announcement-church">Blessed Group&nbsp;&nbsp;Poka</div>
        </div>
        <div class="announcement-body-wrap" id="announcement-body-wrap">
          <div class="announcement-body" id="announcement-body"></div>
        </div>
      </div>

      <!-- Blank — complete blackout, no content -->
      <div id="state-blank" class="congregation-state congregation-blank" hidden></div>

    </div>
    <script type="module" src="/src/congregation/main.ts"></script>
  </body>
</html>
