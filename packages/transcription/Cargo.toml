[package]
name = "companion-transcription"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
companion-config = { workspace = true }
companion-audio = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tokio-tungstenite = { version = "0.24", features = ["native-tls"] }
futures-util = "0.3"
sha1 = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"] }

# whisper-rs uses whisper.cpp which cannot be compiled with MSVC on Windows
# due to C++ ABI struct layout mismatches. Excluded on Windows; cloud STT
# (AssemblyAI / Deepgram) is the only local fallback available there.
[target.'cfg(not(target_os = "windows"))'.dependencies]
whisper-rs = "0.14"

[dev-dependencies]
tempfile = "3"

[features]
# Metal GPU acceleration (macOS only).
metal = ["whisper-rs/metal"]
