[package]
name = "companion-transcription"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
companion-config = { workspace = true }
companion-audio = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
whisper-rs = "0.11"
sha1 = "0.10"
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "blocking"] }

[dev-dependencies]
tempfile = "3"

[features]
# Enable Metal GPU acceleration on macOS.  Build with `--features metal`.
metal = ["whisper-rs/metal"]
